{% extends 'admin_base.html' %}

{% block topbar_title %}Found Items Gallery{% endblock %}

{% block admin_content %}
<section class="dashboard-section active" id="gallery">
    <div class="section-header">
        <h2 class="section-title">Found Items Gallery</h2>
        <button class="btn btn-primary" id="btn-upload-gallery">+ Upload to Gallery</button>
    </div>
    <div class="grid-view" id="gallery-grid">
        <div class="card">
            <div class="card-img" style="height:200px;">🖼️</div>
            <div class="card-body" style="padding: 1rem;">
                <div class="card-title" style="margin-bottom:0;">Honda Keys</div>
                <div class="card-meta" style="margin-bottom:0;">Found in Central Park</div>
            </div>
        </div>
        <div class="card">
            <div class="card-img" style="height:200px;">🖼️</div>
            <div class="card-body" style="padding: 1rem;">
                <div class="card-title" style="margin-bottom:0;">Leather Wallet</div>
                <div class="card-meta" style="margin-bottom:0;">Found on Main St.</div>
            </div>
        </div>
    </div>
</section>

<!-- Upload Gallery Modal -->
<div class="modal-overlay" id="gallery-modal">
    <div class="modal-content">
        <button class="modal-close" data-dismiss="modal">&times;</button>
        <div class="modal-header">
            <h2>Upload to Gallery</h2>
        </div>
        <form id="gallery-form">
            <div class="form-group">
                <label>Item Image</label>
                <input type="file" accept="image/*" required>
            </div>
            <div class="form-group">
                <label>Item Name</label>
                <input type="text" placeholder="e.g. Blue Umbrella" required>
            </div>
            <div class="form-group">
                <label>Location Found</label>
                <input type="text" placeholder="e.g. Subway Station" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; padding:1rem; margin-top:1rem;">Upload to Gallery</button>
        </form>
    </div>
</div>
{% endblock %}

{% block admin_scripts %}
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const galleryModal = document.getElementById('gallery-modal');
        const closeBtns = document.querySelectorAll('.modal-close');

        if (document.getElementById('btn-upload-gallery')) {
            document.getElementById('btn-upload-gallery').addEventListener('click', () => {
                galleryModal.classList.add('active');
            });
        }

        closeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                galleryModal.classList.remove('active');
            });
        });

        window.addEventListener("click", (e) => {
            if (e.target === galleryModal) galleryModal.classList.remove('active');
        });

        const galleryForm = document.getElementById('gallery-form');
        if (galleryForm) {
            galleryForm.addEventListener('submit', (e) => {
                e.preventDefault();
                galleryModal.classList.remove('active');
                if (window.showNotification) showNotification("Item uploaded to gallery.");
                e.target.reset();
            });
        }
    });
</script>
{% endblock %}
