{% extends 'lostfound/base.html' %}

{% block title %}Login - LOSTFOUND{% endblock %}

{% block content %}
<section class="hero" style="min-height: 80vh; padding-top: 6rem;">
    <div class="container-narrow">
        <div class="card" style="max-width: 500px; margin: 0 auto; padding: 2rem;">
            <div class="text-center mb-3">
                <h2>Welcome Back</h2>
                <p style="color: var(--text-muted);">Sign in to your account</p>
            </div>
            
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" name="username" id="username" class="form-control" required autofocus>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" name="password" id="password" class="form-control" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>
            
            <div class="text-center mt-3">
                <p style="color: var(--text-muted);">
                    Don't have an account? 
                    <a href="{% url 'register' %}" style="color: var(--accent-black); font-weight: 600;">Register here</a>
                </p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
